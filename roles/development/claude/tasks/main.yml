---
- name: Install claude (linux)
  when: ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu'
  block:
    - name: Check if claude is installed
      ansible.builtin.stat:
        path: /home/{{ ansible_user }}/.local/bin/claude
      register: claude

    - name: Download claude install script (linux)
      ansible.builtin.get_url:
        url: https://claude.ai/install.sh
        dest: /tmp/claude.sh
        mode: "0755"
      when: not claude.stat.exists

    - name: Install claude (linux)
      ansible.builtin.command: /tmp/claude.sh
      changed_when: "'successfully installed' in claude_result.stdout"
      register: claude_result
      when: not claude.stat.exists

- name: Install claude (macos)
  community.general.homebrew_cask:
    name: claude-code
    install_options: appdir=/Applications
    state: latest
  when: ansible_distribution == 'MacOSX'

- name: Find claude marketplaces (linux/macos)
  ansible.builtin.command: claude plugin marketplace list
  changed_when: false
  register: marketplaces

- name: Add claude marketplace (linux/macos)
  ansible.builtin.command: claude plugin marketplace add anthropics/claude-plugins-official
  changed_when: "'successfully' not in marketplace_result.stdout"
  register: marketplace_result
  when: "'anthropics/claude-plugins-official' not in marketplaces.stdout"

- name: Find claude plugins (linux/macos)
  ansible.builtin.command: claude plugin list
  register: plugins
  changed_when: false

- name: Install claude plugins (linux/macos)
  ansible.builtin.command: claude plugin install {{ item }}@claude-plugins-official --scope user
  changed_when: "'successfully' in plugin_result.stdout"
  register: plugin_result
  with_items: "{{ claude.plugins }}"
  when: item not in plugins.stdout
